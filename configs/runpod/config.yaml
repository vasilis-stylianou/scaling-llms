work_dir: ~/Desktop/scaling-llms # fix this bug

pod_spec:
  name: test-run-experiments
  image_name: runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04
  gpu_type_id: NVIDIA A100-SXM4-80GB
  cloud_type: SECURE
  container_disk_in_gb: 20
  volume_in_gb: 40
  ports: "22/tcp"
  identity_file: ~/.ssh/runpod_key
  env:
    DATABASE_URL: ${DATABASE_URL}

provisioning:
  repo_dir: /workspace/repos/scaling-llms
  repo_url: https://github.com/vasilis-stylianou/scaling-llms.git
  repo_branch: main
  identity_file: ~/.ssh/runpod_key
  rclone_config_local: ~/.config/rclone/rclone.conf
  rclone_config_remote: /root/.config/rclone/rclone.conf
  create_jupyter_kernel: false
  kernel_name: scaling-llms
  kernel_display_name: "Python (scaling-llms)"
  poetry_install_args: []

job_launcher_spec:
  repo_dir: /workspace/repos/scaling-llms # to rename: work_dir
  command: >
    poetry run python scripts/run_experiments.py
    src/scaling_llms/experiment_configs/tests/rclone_sync_runs.py
  identity_file: ~/.ssh/runpod_key
  tmux_session_name: test_run_experiments_session
  log_path: /workspace/jobs/test_run_experiments_session.log

workflow:
  reuse_if_exists: false
  timeout_s: 120
  poll_s: 5
  terminate_after_launch: false
  terminate_on_failure: false
  retry_policy:
    max_attempts: 5
    retry_base_s: 2.0