identity_file: ~/.ssh/runpod_key

# Create Pod Args
pod_spec:
  name: dev-pod-orchestrator
  image_name: runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04
  gpu_type_id: NVIDIA A100-SXM4-80GB
  gpu_count: 2
  cpu_type_id: # cpu5g-4-16
  cloud_type: SECURE
  container_disk_in_gb: 20
  volume_in_gb: 40
  ports: "22/tcp"
  env:
    DATABASE_URL: ${DATABASE_URL}

provisioning:
  # copy_rclone_config
  rclone_config_local: ~/.config/rclone/rclone.conf
  rclone_config_remote: /root/.config/rclone/rclone.conf
  # clone_or_update_repo
  repo_dir: /workspace/repos/scaling-llms
  repo_url: https://github.com/vasilis-stylianou/scaling-llms.git
  repo_branch: main
  # copy_env_file
  env_file_local: ~/Desktop/scaling-llms/.env 
  env_file_remote: /workspace/repos/scaling-llms/.env
  # --- Optional provisioning steps ---
  # create_jupyter_kernel
  create_jupyter_kernel: false
  kernel_name: scaling-llms
  kernel_display_name: "Python (scaling-llms)"
  # poetry_install
  poetry_install_args: []

command_spec:
  work_dir: /workspace/repos/scaling-llms
  tmux_session_name: dev_pod_orchestrator_session
  log_path: /workspace/tmux_logs/dev_pod_orchestrator_session.log
  # command: poetry run python scripts/run_experiments.py /workspace/runtime_configs/run_experiments.yaml
  command: poetry run python -m torch.distributed.run --standalone --nnodes=1 --nproc_per_node=2 scripts/run_experiments.py /workspace/runtime_configs/run_experiments.yaml --backend nccl
  upload_files:
    - local: /Users/vasilis/Desktop/scaling-llms/configs/dev_run_experiments.yaml
      remote: /workspace/runtime_configs/run_experiments.yaml
  stop_pod_at_success: false
  stop_pod_at_failure: false

workflow:
  reuse_if_exists: false
  timeout_s: 120
  poll_s: 5
  terminate_after_launch: false
  terminate_on_failure: true
  retry_policy:
    max_attempts: 5
    retry_base_s: 2.0