experiment_config_module: scaling_llms.experiment_configs.test_run

registries:
  database_url_env_name: DATABASE_URL
  runs:
    artifacts_root: ~/Desktop/tests/local_runs/artifacts
    table_name: dev_runs
    sync_hooks_type: rclone
    sync_hooks_args: 
      remote_rclone_name: gdrive
      remote_artifacts_root: ml-experiments/scaling-llms-dev
      

  datasets:
    artifacts_root: ~/Desktop/tests/local_datasets/artifacts
    table_name: dev_datasets
    sync_hooks_type: rclone
    sync_hooks_args:
      remote_rclone_name: gdrive
      remote_artifacts_root: ml-experiments/scaling-llms-dev